# Adapted from dome-docs/templates/ci-python.yml for the agent-flow monorepo:
# a Python backend in backend/ + a Next.js frontend in frontend/. Three gates —
# `ci` (backend), `Frontend`, and `docker-build` — mirroring the other DOME tools.
name: ci

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Verify lock files match their inputs
        # Seeded re-compile (cp first, NO --upgrade): a routine PyPI release can't
        # drift the result; only an un-recompiled .in change or a hand-edited lock
        # fails this gate. Deliberate bumps arrive as Dependabot PRs.
        run: |
          cp requirements.txt /tmp/req.txt
          uv pip compile requirements.in -o /tmp/req.txt --python-version 3.12
          tail -n +3 requirements.txt > /tmp/req-local.txt
          tail -n +3 /tmp/req.txt > /tmp/req-ci.txt
          diff /tmp/req-local.txt /tmp/req-ci.txt
          cp requirements-dev.txt /tmp/req-dev.txt
          uv pip compile requirements-dev.in -o /tmp/req-dev.txt --python-version 3.12
          tail -n +3 requirements-dev.txt > /tmp/req-dev-local.txt
          tail -n +3 /tmp/req-dev.txt > /tmp/req-dev-ci.txt
          diff /tmp/req-dev-local.txt /tmp/req-dev-ci.txt
      - name: Lint (ruff check)
        run: ruff check .
      - name: Format check (ruff format)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy .
      - name: Tests (pytest)
        run: pytest
      - name: Security audit (pip-audit)
        run: uvx pip-audit --no-deps -r requirements.txt

  frontend-check:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b --noEmit
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image (no push)
        run: docker build -t ci-build backend/
